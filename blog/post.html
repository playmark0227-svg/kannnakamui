<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="meta-title">記事 — KANNA KAMUY</title>
  <meta name="description" id="meta-desc" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="blog.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <span class="logo-en">KANNA KAMUY</span>
        <span class="logo-ja">人生に寄り添う支援</span>
      </a>
      <nav class="header-nav">
        <a href="../index.html#about">私たちについて</a>
        <a href="../index.html#message">代表挨拶</a>
        <a href="../index.html#services">サービス</a>
        <a href="../index.html#flow">ご相談の流れ</a>
        <a href="index.html" class="current">実績・ブログ</a>
        <a href="../ec/index.html">ショップ</a>
        <a href="../index.html#company">会社概要</a>
        <a href="../index.html#contact" class="nav-cta">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <!-- BREADCRUMB -->
  <div class="breadcrumb-wrap">
    <div class="blog-container">
      <nav class="breadcrumb">
        <a href="../index.html">TOP</a>
        <span>/</span>
        <a href="index.html">実績・ブログ</a>
        <span>/</span>
        <span id="breadcrumb-title">記事</span>
      </nav>
    </div>
  </div>

  <!-- ARTICLE -->
  <main class="post-main">
    <div class="blog-container post-container">

      <!-- 記事が見つからない場合 -->
      <div id="post-not-found" style="display:none" class="not-found">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="32" cy="32" r="28"/><path d="M32 20v16M32 42v2" stroke-linecap="round"/></svg>
        <h2>記事が見つかりませんでした</h2>
        <a href="index.html" class="btn-back-list">← 一覧に戻る</a>
      </div>

      <!-- 記事本体 -->
      <article id="post-article" style="display:none">

        <!-- ヘッダー -->
        <header class="post-header">
          <div class="post-meta-top">
            <span class="post-category" id="post-category"></span>
            <span class="post-date" id="post-date"></span>
          </div>
          <h1 class="post-title" id="post-title"></h1>
          <div class="post-tags" id="post-tags"></div>
        </header>

        <!-- カバー画像 -->
        <div class="post-cover-wrap" id="post-cover-wrap">
          <img id="post-cover" src="" alt="" class="post-cover" />
        </div>

        <!-- 本文 -->
        <div class="post-body" id="post-body"></div>

        <!-- 前後ナビ -->
        <nav class="post-nav" id="post-nav"></nav>

        <!-- CTA -->
        <div class="post-cta">
          <p class="post-cta-text">お困りのことがあれば、<br>まずはお気軽にご相談ください。</p>
          <a href="../index.html#contact" class="btn-post-cta">無料相談を予約する</a>
          <a href="index.html" class="post-back-link">← 一覧に戻る</a>
        </div>

      </article>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="blog-footer">
    <div class="blog-container">
      <div class="blog-footer-inner">
        <div>
          <p class="footer-logo-en">KANNA KAMUY</p>
          <p class="footer-logo-ja">人生に寄り添う支援</p>
        </div>
        <nav class="footer-nav">
          <a href="../index.html">トップ</a>
          <a href="../index.html#services">サービス</a>
          <a href="index.html">実績・ブログ</a>
          <a href="../index.html#contact">お問い合わせ</a>
        </nav>
      </div>
      <p class="footer-copy">&copy; 2025 KANNA KAMUY. All rights reserved.</p>
    </div>
  </footer>

  <script src="../assets/js/store.js"></script>
  <script src="blog.js"></script>
</body>
</html>
